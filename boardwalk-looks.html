<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Pick Your Shorts · All You SEA is Love</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Boardwalk day look builder. Same tee for everyone, your choice of shorts.">
  <meta name="theme-color" content="#15130F">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body class="standalone">
  <div class="grain" aria-hidden="true"></div>

  <header class="topbar">
    <a class="hamburger" href="index.html#/bachelorette" aria-label="Back to the hub" style="text-decoration:none;display:grid;place-items:center;font-size:20px;">&#8592;</a>
    <a class="wordmark" href="index.html#/home">Becoming <span class="gold">Bergkamp</span></a>
    <span class="shellglyph" aria-hidden="true">&#128025;</span>
  </header>

  <main>
    <section class="day day--boardwalk" style="padding-top:46px;">
      <div class="wrap"><div class="day__inner">
        <div class="label" id="bw-kicker"></div>
        <h2 id="bw-title"></h2>
        <p class="vibe" id="bw-intro"></p>
        <div id="bw-widget"></div>
        <footer class="pagefoot">
          <div class="script" id="bw-foot-script"></div>
          <div class="line" id="bw-foot-line"></div>
        </footer>
      </div></div>
    </section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox__close" aria-label="Close">&times;</button>
    <img src="" alt="">
  </div>

  <script src="scripts/data.js"></script>
  <script src="scripts/boardwalk.js"></script>
  <script>
  (function () {
    "use strict";
    var w = DATA.boardwalk;
    document.getElementById("bw-kicker").textContent = w.kicker;
    document.getElementById("bw-title").textContent = w.title;
    document.getElementById("bw-intro").textContent = w.intro;
    document.getElementById("bw-foot-script").textContent = w.footerScript;
    document.getElementById("bw-foot-line").textContent = w.footerLine;

    var host = document.getElementById("bw-widget");
    host.innerHTML = window.Boardwalk.html();
    window.Boardwalk.init(host);

    // lightbox
    var lb = document.getElementById("lightbox");
    var img = lb.querySelector("img");
    var closeBtn = lb.querySelector(".lightbox__close");
    document.addEventListener("click", function (e) {
      var tile = e.target.closest && e.target.closest(".look-tile");
      if (tile) {
        img.src = tile.getAttribute("data-zoom");
        img.alt = (tile.getAttribute("data-look")||"Look") + ", front and back";
        lb.classList.add("is-open");
        lb.setAttribute("aria-hidden", "false");
        if (closeBtn) closeBtn.focus();
      }
    });
    function close(){ lb.classList.remove("is-open"); lb.setAttribute("aria-hidden","true"); img.src=""; }
    lb.addEventListener("click", close);
    document.addEventListener("keydown", function(e){ if(e.key==="Escape") close(); });
  })();
  </script>
</body>
</html>
